server:
  port: 8080

spring:
  application:
    name: flashsell
  datasource:
    url: jdbc:mysql://localhost:3306/flashsell?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: flashsell-secret-key-must-be-at-least-256-bits-for-hs256!!
  expiration: 604800000
