server:
  port: 8080

spring:
  application:
    name: flashsell
  datasource:
    url: jdbc:mysql://localhost:3306/flashsell?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    # SQL 日志现在走 logback-spring.xml 里的 com.faraday.flashsell.dao
    # 压测时不想看 SQL：把 logback 里 dao 的 level 改成 WARN 即可

jwt:
  secret: flashsell-secret-key-must-be-at-least-256-bits-for-hs256!!
  expiration: 604800000
